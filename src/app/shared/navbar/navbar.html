<nav class="navbar navbar-expand-lg navbar-dark navbar-book fixed-top z-5 px-4" style="min-height: 60px">
  <a class="navbar-brand fw-bold font-serif mb-0" routerLink="/">
    <i class="fa-solid fa-book-open me-2"></i>Book<span class="logo-accent">store</span>
  </a>
  <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMain">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex flex-column flex-lg-row gap-1 gap-lg-2">
      <li class="nav-item">
        <a class="nav-link px-2 py-1 rounded d-flex align-items-center" routerLink="/books"
          routerLinkActive="active-link">
          <i class="fa-solid fa-book me-2 d-lg-none"></i>Books
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link px-2 py-1 rounded d-flex align-items-center" routerLink="/authors"
          routerLinkActive="active-link">
          <i class="fa-solid fa-user-pen me-2 d-lg-none"></i>Authors
        </a>
      </li>
    </ul>
    <hr class="d-lg-none border-light my-2 opacity-25" />
    <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-1 gap-lg-2 mb-3 mb-lg-0">
      @if (isLoggedIn) {
      @if(!isAdmin) {
      <a class="nav-link text-white position-relative px-2 py-1 rounded d-flex align-items-center" routerLink="/cart"
        routerLinkActive="active-link">
        <i class="fa-solid fa-cart-shopping me-2"></i>
        <span class="d-lg-none">Cart</span>
        <span class="position-absolute badge rounded-pill bg-book-accent text-brown"
          style="font-size: 9px; top: 2px; right: 2px">{{ cartItemCount }}</span>
      </a>
      <a class="nav-link text-white-50 px-2 py-1 rounded" routerLink="/orders" routerLinkActive="active-link">
        <i class="fa-solid fa-box me-2 d-lg-none"></i>My Orders
      </a>
      <a class="nav-link text-white-50 px-2 py-1 rounded" routerLink="/profile" routerLinkActive="active-link">
        <i class="fa-solid fa-user me-2 d-lg-none"></i>Profile
      </a>
      }
      @if (isAdmin) {
      <a class="nav-link text-white-50 px-2 py-1 rounded" routerLink="/admin" routerLinkActive="active-link">
        <i class="fa-sharp-duotone fa-solid fa-user-tie me-2 d-lg-none"></i>Admin
      </a>
      }
      <hr class="d-lg-none border-light my-1 opacity-25" />
      <button class="btn btn-outline-light btn-sm font-mono mt-1 mt-lg-0" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket me-2 d-lg-none"></i>Logout
      </button>
      } @else {
      <a class="btn btn-outline-light btn-sm w-100 w-lg-auto fw-bold" routerLink="/auth/login">Sign In</a>
      <a class="btn btn-book-accent btn-sm fw-bold w-100 w-lg-auto" routerLink="/auth/register">Register</a>
      }
    </div>

    <!-- Dark Mode Toggle -->
    <button class="theme-toggle ms-2" (click)="toggleDark()"
      [attr.title]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (isDark()) {
      <i class="fa-solid fa-sun"></i>
      } @else {
      <i class="fa-solid fa-moon"></i>
      }
    </button>
  </div>
</nav>
