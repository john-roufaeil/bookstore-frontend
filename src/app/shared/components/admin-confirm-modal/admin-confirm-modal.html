<app-admin-modal [open]="open" [title]="title" (closed)="closed.emit()">
  <p class="mb-0">{{ message }}</p>

  @if (error) {
    <div class="alert alert-danger border-0 shadow-sm mt-3 mb-0">{{ error }}</div>
  }

  <div footer class="d-flex gap-2">
    <button type="button" class="btn btn-book-outline" (click)="closed.emit()">Cancel</button>
    <button type="button" class="btn" [ngClass]="confirmClass" [disabled]="confirmDisabled" (click)="confirmed.emit()">
      {{ confirmText }}
    </button>
  </div>
</app-admin-modal>
