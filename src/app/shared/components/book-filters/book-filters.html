<div class="mb-4">
    <label class="form-label small fw-black text-muted text-uppercase mb-3"
        style="font-size: 0.6rem; letter-spacing: 0.1em;">Find Volumes</label>
    <div class="input-group input-group-sm mb-3">
        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control border-start-0 ps-0 shadow-none" placeholder="Book title..."
            [value]="search()" (input)="onSearchInput($event)">
    </div>
</div>

<div class="mb-4">
    <label class="form-label small fw-black text-muted text-uppercase mb-3"
        style="font-size: 0.6rem; letter-spacing: 0.1em;">Categories</label>
    <select class="form-select form-select-sm rounded-3 border shadow-none" style="font-size: 0.75rem;"
        [ngModel]="category()" (ngModelChange)="onCategoryChange($event)">
        <option value="">All Genres</option>
        @for (cat of categories(); track cat._id) {
        <option [value]="cat._id">{{ cat.name }}</option>
        }
    </select>
</div>

<div class="mb-4">
    <label class="form-label small fw-black text-muted text-uppercase mb-3"
        style="font-size: 0.6rem; letter-spacing: 0.1em;">Author</label>
    <select class="form-select form-select-sm rounded-3 border shadow-none" style="font-size: 0.75rem;"
        [ngModel]="author()" (ngModelChange)="onAuthorChange($event)">
        <option value="">All Authors</option>
        @for (author of authors(); track author._id) {
        <option [value]="author._id">{{ author.name }}</option>
        }
    </select>
</div>

<div class="mb-4">
    <label class="form-label small fw-black text-muted text-uppercase mb-3"
        style="font-size: 0.6rem; letter-spacing: 0.1em;">Price Range</label>
    <div class="d-flex gap-2 align-items-center">
        <input type="number" class="form-control form-control-sm rounded-3 border shadow-none"
            style="font-size: 0.75rem;" placeholder="Min" [ngModel]="minPrice()"
            (ngModelChange)="minPrice.set($event); emitChange()" min="0">
        <span class="text-muted fw-bold xx-small">—</span>
        <input type="number" class="form-control form-control-sm rounded-3 border shadow-none"
            style="font-size: 0.75rem;" placeholder="Max" [ngModel]="maxPrice()"
            (ngModelChange)="maxPrice.set($event); emitChange()" min="0">
    </div>
</div>
