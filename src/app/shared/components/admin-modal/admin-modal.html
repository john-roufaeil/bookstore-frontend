@if (open) {
  <div class="modal fade show d-block" tabindex="-1" role="dialog" aria-modal="true" (click)="close()">
    <div class="modal-dialog modal-lg modal-dialog-centered" (click)="$event.stopPropagation()">
      <div class="modal-content border-0 shadow-lg rounded-4">
        <div class="modal-header">
          <h5 class="modal-title fw-bold text-brown">{{ title }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
        </div>

        <div class="modal-body">
          <ng-content></ng-content>
        </div>

        <div class="modal-footer">
          <ng-content select="[footer]"></ng-content>
          <button type="button" class="btn btn-book-outline" (click)="close()">Close</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" (click)="close()"></div>
}
