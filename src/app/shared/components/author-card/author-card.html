<a [routerLink]="['/authors', author._id]" class="card author-card h-100 shadow-sm text-decoration-none">
  <div class="card-body d-flex flex-column gap-3 p-3">
    <div class="d-flex align-items-center gap-3">
      <div class="author-avatar rounded-circle d-flex align-items-center justify-content-center fw-bold flex-shrink-0">
        {{ author.name.charAt(0) }}
      </div>

      <div class="author-meta">
        <div class="author-name text-brown fw-bold text-truncate">
          {{ author.name }}
        </div>

        <div class="author-books small text-muted font-monospace">
          {{ author.bookCount === undefined ? '' : (author.bookCount + ' book' + (author.bookCount === 1 ? '' : 's')) }}
        </div>
      </div>
    </div>

    <p class="author-bio small text-muted mb-0 flex-grow-1">
      {{ author.bio ? (author.bio.length > 150 ? (author.bio.slice(0, 150) + '...') : author.bio) : '' }}
    </p>

    <div class="author-cta mt-auto fw-semibold">
      View Profile <i class="bi bi-arrow-right ms-1" aria-hidden="true"></i>
    </div>
  </div>
</a>
