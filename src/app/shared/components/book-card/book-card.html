<div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative hover-lift"
    style="cursor: pointer;" [routerLink]="['/books', book()?._id || '']">

    <div class="position-relative">
        @if (book()?.coverImage) {
        <img [src]="book().coverImage" [alt]="book().name" class="card-img-top"
            style="height: 200px; object-fit: cover;" loading="lazy" />
        } @else {
        <div class="card-img-top d-flex align-items-center justify-content-center bg-light text-secondary"
            style="height: 200px; font-size: 2.5rem;">
            <i class="bi bi-book"></i>
        </div>
        }

        @if (isOutOfStock()) {
        <span class="badge bg-danger position-absolute top-0 end-0 m-2 rounded-pill fw-black shadow-sm"
            style="font-size: 0.6rem;">SOLD OUT</span>
        }
    </div>


    <div class="card-body d-flex flex-column p-3">
        <h6 class="card-title fw-black text-dark mb-1 fs-6 text-truncate tracking-tighter">{{ book()?.name }}</h6>
        <p class="text-muted fw-bold mb-2 opacity-75 d-flex justify-content-between"
            style="font-size: 0.6rem; letter-spacing: 0.05em;">
            <span>{{ book()?.author?.name || 'Unknown Author' }}</span>
            <span class="text-warning-emphasis bg-warning bg-opacity-10 px-2 rounded-pill font-monospace"
                style="font-size: 0.55rem;">
                {{ book()?.category?.name || 'Uncategorized' }}
            </span>
        </p>


        <div class="mt-auto d-flex justify-content-between align-items-center pt-2">
            <span class="fw-black text-dark" style="font-size: 1.1rem;">${{ book()?.price | number:'1.2-2' }}</span>
            <button class="btn btn-sm btn-warning rounded-pill px-3 fw-black x-small shadow-sm hover-scale"
                [disabled]="isOutOfStock()" (click)="onAddToCart($event)">
                <i class="bi bi-cart-fill me-1"></i> ADD
            </button>
        </div>
    </div>
</div>
