<section class="container">
  <app-admin-toolbar
    title="Categories"
    subtitle="Manage categories."
    [search]="search"
    searchPlaceholder="Search categories…"
    (searchChange)="onSearchChange($event)"
    (refresh)="fetchCategories()"
  >
    <button type="button" class="btn btn-book-primary btn-sm" (click)="openCreate()">
      <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>
      Create
    </button>

    <select
      class="form-select form-select-sm border-book"
      style="width: 190px;"
      [ngModel]="sort"
      (ngModelChange)="onSortChange($event)"
    >
      <option value="">Sort…</option>
      <option value="createdAt:desc">Newest</option>
      <option value="createdAt:asc">Oldest</option>
    </select>
  </app-admin-toolbar>

  @if (pageErrorMessage()) {
    <div class="alert alert-danger border-0 shadow-sm">{{ pageErrorMessage() }}</div>
  }

  <app-admin-table
    [columns]="columns"
    [rows]="pagedCategories"
    [loading]="loading()"
    emptyText="No categories found."
    [currentPage]="page()"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)"
  >
    <ng-template let-category>
      <tr>
        <td class="fw-semibold text-brown">{{ category.name }}</td>
        <td class="text-muted">{{ category.createdAt ? (category.createdAt | date:'medium') : '—' }}</td>
        <td class="text-end">
          <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-book-outline" [disabled]="saving()" (click)="openEdit(category)">
              Edit
            </button>
            <button type="button" class="btn btn-outline-danger" [disabled]="saving()" (click)="openDelete(category)">
              Delete
            </button>
          </div>
        </td>
      </tr>
    </ng-template>
  </app-admin-table>
</section>

<app-admin-form-modal
  [open]="formOpen()"
  [title]="editingId() ? 'Edit Category' : 'Create Category'"
  [submitText]="saving() ? 'Saving...' : 'Save'"
  [submitDisabled]="saving() || !draftName().trim()"
  (submitted)="saveDraft()"
  (closed)="closeForm()"
>
  @if (modalErrorMessage()) {
    <div class="alert alert-danger border-0 shadow-sm">{{ modalErrorMessage() }}</div>
  }

  <label class="form-label small text-uppercase tracking-widest fw-bold text-muted">Name</label>
  <input
    class="form-control border-book"
    [disabled]="saving()"
    [ngModel]="draftName()"
    (ngModelChange)="draftName.set($event)"
    name="categoryName"
  />
</app-admin-form-modal>

<app-admin-confirm-modal
  [open]="deleteOpen()"
  title="Delete category"
  [message]="'Delete ' + (selectedForDelete()?.name || '') + '?'"
  [error]="modalErrorMessage()"
  [confirmText]="saving() ? 'Deleting...' : 'Delete'"
  [confirmDisabled]="saving()"
  (confirmed)="confirmDelete()"
  (closed)="closeDelete()"
></app-admin-confirm-modal>
