<div class="admin-shell mt-2">
  <aside class="admin-sidebar border-end bg-light">
    <div class="px-3 py-3">
      <div class="text-uppercase small text-muted fw-bold tracking-widest mb-2">Manage</div>
      <nav class="nav nav-pills flex-column gap-1">
        <a class="nav-link admin-nav-link" routerLink="/admin/books" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-book me-2" aria-hidden="true"></i>
          Books
        </a>
        <a class="nav-link admin-nav-link" routerLink="/admin/authors" routerLinkActive="active">
          <i class="bi bi-pen me-2" aria-hidden="true"></i>
          Authors
        </a>
        <a class="nav-link admin-nav-link" routerLink="/admin/categories" routerLinkActive="active">
          <i class="bi bi-tags me-2" aria-hidden="true"></i>
          Categories
        </a>
        <a class="nav-link admin-nav-link" routerLink="/admin/orders" routerLinkActive="active">
          <i class="bi bi-bag-check me-2" aria-hidden="true"></i>
          Orders
        </a>
        <a class="nav-link admin-nav-link" routerLink="/admin/reviews" routerLinkActive="active">
          <i class="bi bi-chat-left-text me-2" aria-hidden="true"></i>
          Reviews
        </a>
      </nav>
    </div>
  </aside>

  <main class="admin-main py-4">
    <router-outlet></router-outlet>
  </main>
</div>
